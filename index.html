<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YANPE</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* Background Glow Animation /
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,0,0,0.15), transparent 60%);
    animation: pulse 6s infinite;
    z-index: 0;
}

@keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 0.7; }
    100% { opacity: 0.3; }
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
}

/ Huge Background Text /
.bg-text {
    position: absolute;
    font-size: 22vw;
    font-weight: 900;
    color: rgba(255,255,255,0.03);
    z-index: 0;
    user-select: none;
}

/ Logo /
.logo {
    font-size: 90px;
    font-weight: bold;
    z-index: 2;
    color: #ff2b2b;
    text-shadow: 0 0 25px rgba(255,0,0,0.7);
    animation: fadeUp 1.2s ease forwards;
}

/ Signature /
.signature {
    margin-top: 10px;
    font-size: 22px;
    color: #ff4d4d;
    font-family: cursive;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards;
}

/ Links /
.links {
    margin-top: 30px;
    z-index: 2;
    display: flex;
    gap: 20px;
    opacity: 0;
    animation: fadeUp 1.8s ease forwards;
}

.links a {
    text-decoration: none;
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 20px;
    border-radius: 30px;
    transition: 0.3s;
}

.links a:hover {
    background: #ff2b2b;
    border-color: #ff2b2b;
}

/ Spotify /
.spotify {
    margin-top: 40px;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
}

/ Animation */
@keyframes fadeUp {
    from {
        transform: translateY(20px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="bg-text">YANPE</div>

    <div class="logo">YP</div>

    <div class="signature">Yanpe</div>

    <div class="links">
        <a href="https://instagram.com/yanpeoficial" target="_blank">Instagram</a>
        <a href="https://open.spotify.com/artist/2mjm69DhnPdhk22CG5llti?si=CnV7aXZgQpGhyUp0HzRlvw" target="_blank">Spotify</a>
    </div>

    <div class="spotify">
        <iframe style="border-radius:12px" 
        src="https://open.spotify.com/embed/artist/2mjm69DhnPdhk22CG5llti" 
        width="300" height="380" frameBorder="0" allowfullscreen="" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>

</div>

</body>
</html>
