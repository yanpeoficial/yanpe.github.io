<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YANPE | MALA — 2026</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --accent: #ff0000;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Navigation - Simple and Visible */
        nav {
            padding: 30px;
            background: #000;
            border-bottom: 1px solid #111;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero Section */
        #hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514525253361-b83a85f08a71?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            margin: 0;
            letter-spacing: -5px;
        }

        .subtitle {
            letter-spacing: 10px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Music Section - FIXED SPOTIFY */
        #music {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .spotify-container {
            border: 2px solid #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        /* Visuals Section */
        .editorial {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .editorial img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .editorial img:hover {
            filter: grayscale(0%);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            margin: 20px 10px;
            padding: 15px 40px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        .btn-spotify {
            border-color: #1DB954;
            color: #1DB954;
        }

        .btn-spotify:hover {
            background: #1DB954;
            color: white;
        }

        footer {
            padding: 100px 20px;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#hero">Home</a>
        <a href="#music">Music</a>
        <a href="#visuals">Visuals</a>
        <a href="#socials">Socials</a>
    </nav>

    <section id="hero">
        <h1>YANPE</h1>
        <div class="subtitle">MALA — Nueva Era 2026</div>
    </section>

    <section id="music">
        <h2 style="letter-spacing: 5px; margin-bottom: 30px;">LATEST ALBUM</h2>
        <div class="spotify-container">
            <!-- This is your specific Album Link -->
            <iframe src="https://open.spotify.com/embed/album/7hcItNG0Dzlj80JNmpcdEy?utm_source=generator&theme=0" 
                    width="100%" height="380" frameBorder="0" allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
        <a href="https://open.spotify.com/album/7hcItNG0Dzlj80JNmpcdEy" class="btn btn-spotify" target="_blank">Listen on Spotify App</a>
    </section>

    <section id="visuals">
        <div class="editorial">
            <!-- Artist Visuals -->
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800" alt="Yanpe 1">
            <img src="https://images.unsplash.com/photo-1514525253361-b83a85f08a71?auto=format&fit=crop&q=80&w=800" alt="Yanpe 2">
        </div>
    </section>

    <section id="socials" style="padding: 100px 20px;">
        <h2 style="letter-spacing: 5px;">CONNECT</h2>
        <a href="#" class="btn">Instagram</a>
        <a href="#" class="btn">YouTube</a>
        <a href="#" class="btn">TikTok</a>
    </section>

    <footer>
        © 2026 YANPE STUDIOS | MALA PROJECT
    </footer>

</body>
</html>
