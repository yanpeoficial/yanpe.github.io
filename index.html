<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YANPE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  height: 100vh;
  background: 
    linear-gradient(to bottom, rgba(0,0,0,0.7), #050505),
    url('hero.jpg') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 90px;
  color: white;
  letter-spacing: 10px;
  text-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.hero p {
  color: #ff2a2a;
  letter-spacing: 4px;
}

/* SECTIONS */
section {
  padding: 100px 20px;
  text-align: center;
}

h2 {
  color: #ff2a2a;
  margin-bottom: 20px;
  letter-spacing: 3px;
}

/* MUSIC */
iframe {
  border-radius: 20px;
}

/* ABOUT */
.about {
  max-width: 600px;
  margin: auto;
  opacity: 0.8;
}

/* SOCIALS */
.socials a {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border: 1px solid #ff2a2a;
  color: #ff2a2a;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
}

.socials a:hover {
  background: #ff2a2a;
  color: black;
}
</style>
</head>

<body>

<nav>
  <a href="#home">HOME</a>
  <a href="#music">MUSIC</a>
  <a href="#about">ABOUT</a>
  <a href="#socials">SOCIALS</a>
</nav>

<section id="home" class="hero">
  <h1>YANPE</h1>
  <p>MALA — NUEVA ERA 2026</p>
</section>

<section id="music">
  <h2>MUSIC</h2>
  <iframe src="https://open.spotify.com/embed/artist/2mjm69DhnPdhk22CG5llti" width="300" height="380"></iframe>
</section>

<section id="about" class="about">
  <h2>ABOUT</h2>
  <p>
    Yanpe introduces a new era of dark luxury reggaetón.
    A sound built on emotion, nightlife, and presence.
    This is not a trend — this is a statement.
  </p>
</section>

<section id="socials" class="socials">
  <h2>CONNECT</h2>
  <a href="https://instagram.com/yanpeoficial" target="_blank">Instagram</a>
  <a href="https://open.spotify.com/artist/2mjm69DhnPdhk22CG5llti" target="_blank">Spotify</a>
</section>

</body>
</html>
