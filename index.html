<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YANPE</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #050505;
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
}

/* SECTIONS */
section {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* HERO */
.hero {
  background: radial-gradient(circle, rgba(255,0,0,0.25), black);
}

.hero h1 {
  font-size: 90px;
  color: #ff2a2a;
  text-shadow: 0 0 25px rgba(255,0,0,0.8);
  margin: 0;
}

.hero p {
  opacity: 0.7;
  letter-spacing: 3px;
}

/* MUSIC */
.music iframe {
  border-radius: 20px;
  width: 300px;
  height: 380px;
}

/* ABOUT */
.about {
  max-width: 600px;
  text-align: center;
  opacity: 0.8;
}

/* SOCIALS */
.socials a {
  display: block;
  margin: 10px;
  padding: 12px 25px;
  border: 1px solid #ff2a2a;
  color: #ff2a2a;
  text-decoration: none;
  border-radius: 30px;
}

/* glow effect */
.glow {
  text-shadow: 0 0 15px red;
}

</style>
</head>

<body>

<nav>
  <a href="#home">HOME</a>
  <a href="#music">MUSIC</a>
  <a href="#about">ABOUT</a>
  <a href="#socials">SOCIALS</a>
</nav>

<section id="home" class="hero">
  <h1>YANPE</h1>
  <p>MALA ERA</p>
</section>

<section id="music" class="music">
  <h2 class="glow">LATEST RELEASE</h2>
  <iframe src="https://open.spotify.com/embed/artist/2mjm69DhnPdhk22CG5llti"></iframe>
</section>

<section id="about" class="about">
  <h2 class="glow">ABOUT</h2>
  <p>
    Yanpe is a new wave artist bringing a dark luxury reggaetón sound.
    Blending emotion, nightlife energy, and modern Latin influence,
    this is the start of a new era.
  </p>
</section>

<section id="socials" class="socials">
  <h2 class="glow">CONNECT</h2>
  <a href="https://instagram.com/yanpeoficial" target="_blank">Instagram</a>
  <a href="https://open.spotify.com/artist/2mjm69DhnPdhk22CG5llti" target="_blank">Spotify</a>
</section>

</body>
</html>
